<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Roles</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Listado de Roles</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">Inicio</a>
    <a th:href="@{/rol/nuevo}" class="btn btn-primary mb-3">Nuevo Rol</a>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${roles}">
                        <td th:text="${r.idRol}"></td>
                        <td th:text="${r.nombre}"></td>
                        <td th:text="${r.descripcion}"></td>
                        <td>
                            <a th:href="@{/rol/modificar/{idRol}(idRol=${r.idRol})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/rol/eliminar/{idRol}(idRol=${r.idRol})}" class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(roles)}">
                        <td colspan="4" class="text-center">No hay roles registrados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
