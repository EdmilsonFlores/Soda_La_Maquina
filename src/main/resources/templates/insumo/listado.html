<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insumos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        
        <h1 class="text-center mb-4">Inventario de Insumos</h1>

        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Cantidad</th>
                    <th>Unidad</th>
                    <th>Precio</th>
                    <th>Alerta</th>
                    <th>Eliminar</th>
                    <th>Modificar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="i : ${insumos}">
                    <td th:text="${i.idInsumo}">0</td>
                    <td th:text="${i.nombre}">Insumo</td>
                    
                    <td th:if="${i.categoria != null}" th:text="${i.categoria.nombreCategoria}"></td>
                    <td th:if="${i.categoria == null}">Sin categoría</td>
 
                    <td>
                        <a th:href="@{/insumo/eliminar/{id}(id=${i.idInsumo})}" class="btn btn-danger btn-sm">
                            Eliminar
                        </a>
                    </td>
                    
                    <td>
                        <a th:href="@{/insumo/modificar/{id}(id=${i.idInsumo})}" class="btn btn-warning btn-sm">
                            Modificar
                        </a>
                    </td>
                    
                    <td th:text="${i.cantidadActual}">0</td>
                    <td th:text="${i.unidadMedida}">Unidad</td>
                    <td th:text="${i.precioCosto}">0</td>
                    <td th:text="${i.alertaMinima}">0</td>
                </tr>
            </tbody>
        </table>

        <hr class="my-5">

        <div class="card shadow mb-5">

            <div class="card-header bg-primary text-white py-3">
                <h5 class="m-0 font-weight-bold">Registro de Insumos</h5>
            </div>

            <div class="card-body">
                
                <form th:action="@{/insumo/guardar}" th:object="${insumo}" method="post">
                    
                    <input type="hidden" th:field="*{idInsumo}">

                    <div class="mb-3">
                        <label class="form-label">Nombre:</label>
                        <input type="text" class="form-control" th:field="*{nombre}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Categoría:</label>
                        <select class="form-select" th:field="*{categoria}">
                            <option th:each="c : ${categorias}"
                                    th:value="${c.idCategoria}"
                                    th:text="${c.nombreCategoria}">
                            </option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Cantidad:</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{cantidadActual}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Unidad:</label>
                        <input type="text" class="form-control" th:field="*{unidadMedida}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio:</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{precioCosto}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Alerta:</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{alertaMinima}">
                    </div>

                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>

                </form>
            </div>
        </div>

    </div> 
</body>
</html>
