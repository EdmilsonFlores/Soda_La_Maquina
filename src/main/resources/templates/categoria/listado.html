<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">

        <h1 class="text-center mb-4">Gestión de Categorías</h1>

        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Categoría</th>
                    <th>Modificar</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${categorias}">
                    <td th:text="${c.idCategoria}">0</td>
                    <td th:text="${c.nombreCategoria}">Categoría</td>
                    
                    <td>
                        <a th:href="@{/categoria/modificar/{id}(id=${c.idCategoria})}" class="btn btn-warning btn-sm">
                            Modificar
                        </a>
                    </td>
                    <td>
                        <a th:href="@{/categoria/eliminar/{id}(id=${c.idCategoria})}" class="btn btn-danger btn-sm">
                            Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <hr class="my-5">

        <div class="card shadow mb-5">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="m-0 font-weight-bold">Registro de Categoría</h5>
            </div>
            <div class="card-body">
                
                <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">
                    
                    <input type="hidden" th:field="*{idCategoria}">

                    <div class="mb-3">
                        <label class="form-label">Nombre Categoría:</label>
                        <input type="text" class="form-control" th:field="*{nombreCategoria}">
                    </div>

                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>

                </form>
            </div>
        </div>

    </div>
</body>
</html>
