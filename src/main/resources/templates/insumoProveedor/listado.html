<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado Insumo Proveedor</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Listado de Insumos por Proveedor</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">Inicio</a>
    <a th:href="@{/insumoProveedor/nuevo}" class="btn btn-primary mb-3">Nuevo Registro</a>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Insumo</th>
                        <th>Proveedor</th>
                        <th>Precio Compra</th>
                        <th>Tiempo Entrega</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ip : ${insumosProveedor}">
                        <td th:text="${ip.idInsumoProveedor}"></td>
                        <td th:text="${ip.insumo != null ? ip.insumo.descripcion : 'Sin insumo'}"></td>
                        <td th:text="${ip.proveedor != null ? ip.proveedor.nombre : 'Sin proveedor'}"></td>
                        <td th:text="${ip.precioCompra}"></td>
                        <td th:text="${ip.tiempoEntregaDias}"></td>
                        <td th:text="${ip.activo} ? 'Sí' : 'No'"></td>
                        <td>
                            <a th:href="@{/insumoProveedor/modificar/{idInsumoProveedor}(idInsumoProveedor=${ip.idInsumoProveedor})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/insumoProveedor/eliminar/{idInsumoProveedor}(idInsumoProveedor=${ip.idInsumoProveedor})}" class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(insumosProveedor)}">
                        <td colspan="7" class="text-center">No hay registros</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
