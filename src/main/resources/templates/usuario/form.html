<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Usuario</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Formulario Usuario</h2>

    <div class="card shadow">
        <div class="card-body">
            <form th:action="@{/usuario/guardar}" th:object="${usuario}" method="post">
                <input type="hidden" th:field="*{idUsuario}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" th:field="*{username}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" th:field="*{correo}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select th:field="*{rol}" class="form-select">
                        <option value="">Seleccione un rol</option>
                        <option th:each="r : ${roles}"
                                th:value="${r.idRol}"
                                th:text="${r.nombre}">
                        </option>
                    </select>
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" th:field="*{activo}" class="form-check-input">
                    <label class="form-check-label">Activo</label>
                </div>

                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/usuario/listado}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
