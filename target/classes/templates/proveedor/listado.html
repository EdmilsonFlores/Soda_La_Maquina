<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Proveedores</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Listado de Proveedores</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">Inicio</a>
    <a th:href="@{/proveedor/nuevo}" class="btn btn-primary mb-3">Nuevo Proveedor</a>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th>Dirección</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${proveedores}">
                        <td th:text="${p.idProveedor}"></td>
                        <td th:text="${p.nombre}"></td>
                        <td th:text="${p.telefono}"></td>
                        <td th:text="${p.correo}"></td>
                        <td th:text="${p.direccion}"></td>
                        <td th:text="${p.activo} ? 'Sí' : 'No'"></td>
                        <td>
                            <a th:href="@{/proveedor/modificar/{idProveedor}(idProveedor=${p.idProveedor})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/proveedor/eliminar/{idProveedor}(idProveedor=${p.idProveedor})}" class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(proveedores)}">
                        <td colspan="7" class="text-center">No hay proveedores registrados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
