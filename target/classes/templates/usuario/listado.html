<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Usuarios</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Listado de Usuarios</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">Inicio</a>
    <a th:href="@{/usuario/nuevo}" class="btn btn-primary mb-3">Nuevo Usuario</a>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Username</th>
                        <th>Correo</th>
                        <th>Activo</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.idUsuario}"></td>
                        <td th:text="${u.nombre}"></td>
                        <td th:text="${u.username}"></td>
                        <td th:text="${u.correo}"></td>
                        <td th:text="${u.activo} ? 'Sí' : 'No'"></td>
                        <td th:text="${u.rol != null ? u.rol.nombre : 'Sin rol'}"></td>
                        <td>
                            <a th:href="@{/usuario/modificar/{idUsuario}(idUsuario=${u.idUsuario})}" class="btn btn-warning btn-sm">Editar</a>
                            <a th:href="@{/usuario/eliminar/{idUsuario}(idUsuario=${u.idUsuario})}" class="btn btn-danger btn-sm">Eliminar</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="7" class="text-center">No hay usuarios registrados</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
