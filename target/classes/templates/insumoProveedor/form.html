<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Insumo Proveedor</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">Formulario Insumo Proveedor</h2>

    <div class="card shadow">
        <div class="card-body">
            <form th:action="@{/insumoProveedor/guardar}" th:object="${insumoProveedor}" method="post">
                <input type="hidden" th:field="*{idInsumoProveedor}">

                <div class="mb-3">
                    <label class="form-label">Insumo</label>
                    <select th:field="*{insumo}" class="form-select" required>
                        <option value="">Seleccione un insumo</option>
                        <option th:each="i : ${insumos}"
                                th:value="${i.idInsumo}"
                                th:text="${i.descripcion}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Proveedor</label>
                    <select th:field="*{proveedor}" class="form-select" required>
                        <option value="">Seleccione un proveedor</option>
                        <option th:each="p : ${proveedores}"
                                th:value="${p.idProveedor}"
                                th:text="${p.nombre}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Precio Compra</label>
                    <input type="number" step="0.01" th:field="*{precioCompra}" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tiempo Entrega (días)</label>
                    <input type="number" th:field="*{tiempoEntregaDias}" class="form-control">
                </div>

                <div class="form-check mb-3">
                    <input type="checkbox" th:field="*{activo}" class="form-check-input">
                    <label class="form-check-label">Activo</label>
                </div>

                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/insumoProveedor/listado}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
