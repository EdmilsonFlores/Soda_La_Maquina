<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Insumos</title>
</head>

    <body>

        <h1>Inventario de Insumos</h1>

        <form th:action="@{/insumo/guardar}" th:object="${insumo}" method="post">

            <label>Nombre:</label>
            <input type="text" th:field="*{nombre}">

            <br><br>

            <button type="submit">
                Guardar
            </button>

        </form>

        <hr>

        <table border="1">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Eliminar</th>
                </tr>

            </thead>

            <tbody>

                <tr th:each="i : ${insumos}">

                    <td th:text="${i.idInsumo}">
                        0
                    </td>

                    <td th:text="${i.nombre}">
                        Insumo
                    </td>
                    
                    <td>
                        <a th:href="@{/insumo/eliminar/{id}(id=${i.idInsumo})}">
                            Eliminar
                        </a>
                    </td>

                </tr>

            </tbody>

        </table>

    </body>
</html>
