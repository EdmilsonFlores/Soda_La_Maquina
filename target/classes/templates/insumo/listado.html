<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Insumos</title>
</head>

<body>

    <h1>Inventario de Insumos</h1>

    <form th:action="@{/insumo/guardar}" th:object="${insumo}" method="post">

        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}">

        <br><br>

        <button type="submit">
            Guardar
        </button>

    </form>

    <hr>

    <ul>

        <li th:each="i : ${insumos}">

            <span th:text="${i.nombre}">
                Insumo
            </span>

        </li>

    </ul>

</body>
</html>
